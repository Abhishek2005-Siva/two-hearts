org.gradle.jvmargs=-Xmx2560m -XX:MaxMetaspaceSize=1024m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
org.gradle.caching=true
# Parallel task execution spawns multiple worker JVMs at once — on a tight,
# no-swap machine that concurrent memory spike is what triggers the OOM
# kill, so trade some wall-clock time for a much lower peak.
org.gradle.parallel=false
org.gradle.workers.max=2
# Caps the Kotlin compiler's own daemon (separate JVM from the one above).
kotlin.daemon.jvm.options=-Xmx1280m
