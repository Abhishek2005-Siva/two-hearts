<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Our Future Home</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #0d0710; width: 100%; height: 100%; }
  canvas { display: block; touch-action: none; }
  #hint {
    position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
    background: rgba(20,12,18,0.72); color: #FDF0F5; font-family: sans-serif;
    font-size: 13px; padding: 8px 16px; border-radius: 20px; pointer-events: none;
    opacity: 0; transition: opacity 0.25s ease; white-space: nowrap;
  }
  #hint.show { opacity: 1; }
</style>
</head>
<body>
<div id="hint"></div>
<script src="three.min.js"></script>
<script src="OrbitControls.js"></script>
<script>
(function () {
  // ── Palette (interior-design-expert: warm-neutral Japandi/Scandi base +
  // the app's own rose/coral/gold accent language) ──────────────────────
  var FLOORS = {
    oak:       { color: 0xC9A874, rough: 0.75 },
    white_oak: { color: 0xE7DCC6, rough: 0.8 },
    walnut:    { color: 0x6B4226, rough: 0.65 },
    slate:     { color: 0x7C8593, rough: 0.5 }
  };
  var WALLS = {
    greige:   0xE3DACB,
    sage:     0xAFC0A4,
    blush:    0xE8CFC9,
    charcoal: 0x3A3640
  };
  // Ambient/hemisphere (fill) : directional (natural) : point (accent) —
  // layered per the skill's ambient/task/accent/natural lighting model.
  var LIGHTING = {
    warm:    { hemi: 0xFFEEDD, ground: 0x554433, hemiI: 0.75, sunColor: 0xFFDDBB, sunI: 1.05, accent: 0xFFB877, accentI: 1.1 },
    cool:    { hemi: 0xE8F0FF, ground: 0x445566, hemiI: 0.85, sunColor: 0xEFF6FF, sunI: 1.0,  accent: 0xBBD9FF, accentI: 0.7 },
    evening: { hemi: 0x3A2E44, ground: 0x1A1420, hemiI: 0.4,  sunColor: 0x8899CC, sunI: 0.25, accent: 0xFF9F5A, accentI: 1.6 }
  };
  var ACCENT_ROSE = 0xE8899B, ACCENT_CORAL = 0xFF8C5A, ACCENT_GOLD = 0xE8C170;

  var CELL = 1.0;       // house grid cell size, meters
  var WALL_H = 2.7;
  var WALL_THICK = 0.08;
  var FURN_SNAP = 0.5;  // furniture placement snap, meters

  var scene, camera, renderer, controls;
  var groundMesh, hitPlane, wallGroup, floorGroup, hemiLight, sunLight, accentLight, wallMat;
  var furnitureGroup;
  var raycaster, pointer;
  var placingType = null;
  var ghost = null;
  var itemsById = {};   // id -> THREE.Group
  var currentStyle = { floorId: 'oak', wallId: 'greige', lightingId: 'warm' };
  var layout = { gridW: 10, gridD: 8, walls: [], floors: {} };
  var floorSet = {};     // "x,z" -> true, derived from layout.floors
  var editMode = 'furnish'; // 'furnish' | 'walls' | 'floors'
  var paintMaterial = 'oak';
  var lastPaintedCell = null;

  function post(obj) {
    if (window.FlutterBridge && window.FlutterBridge.postMessage) {
      window.FlutterBridge.postMessage(JSON.stringify(obj));
    }
  }

  function showHint(text) {
    var el = document.getElementById('hint');
    if (!text) { el.classList.remove('show'); return; }
    el.textContent = text;
    el.classList.add('show');
  }

  function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1220);
    scene.fog = new THREE.Fog(0x1a1220, 10, 26);

    camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 140);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.maxPolarAngle = Math.PI * 0.49;
    controls.minPolarAngle = Math.PI * 0.12;

    hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
    scene.add(hemiLight);

    sunLight = new THREE.DirectionalLight(0xffffff, 1);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(1024, 1024);
    sunLight.shadow.camera.far = 40;
    sunLight.shadow.bias = -0.0015;
    scene.add(sunLight);

    accentLight = new THREE.PointLight(0xffb877, 1, 8, 2);
    accentLight.castShadow = false;
    scene.add(accentLight);

    furnitureGroup = new THREE.Group();
    scene.add(furnitureGroup);
    wallGroup = new THREE.Group();
    scene.add(wallGroup);
    floorGroup = new THREE.Group();
    scene.add(floorGroup);

    buildGround();
    buildHitPlane();
    rebuildFloors();
    rebuildWalls();
    applyLighting('warm');
    fitCameraToGrid();

    raycaster = new THREE.Raycaster();
    pointer = new THREE.Vector2();

    renderer.domElement.addEventListener('pointerdown', onPointerDown, { passive: true });
    renderer.domElement.addEventListener('pointermove', onPointerMove, { passive: true });
    renderer.domElement.addEventListener('pointerup', onPointerUp, { passive: true });
    window.addEventListener('resize', onResize);

    animate();
    post({ type: 'ready' });
  }

  function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }

  // ── Grid math ────────────────────────────────────────────────────────
  // Cell (x,z) is centered at (cellCenterX(x), cellCenterZ(z)); the boundary
  // "line" index z sits exactly at world z = (z - gridD/2) * CELL, and
  // likewise for x — walls (stored by line) and floor cells (stored by
  // index) share one coordinate system by construction.

  function cellCenterX(x) { return (x - layout.gridW / 2 + 0.5) * CELL; }
  function cellCenterZ(z) { return (z - layout.gridD / 2 + 0.5) * CELL; }

  function cellFromWorld(x, z) {
    var fx = x / CELL + layout.gridW / 2, fz = z / CELL + layout.gridD / 2;
    var cellX = Math.floor(fx), cellZ = Math.floor(fz);
    if (cellX < 0 || cellX >= layout.gridW || cellZ < 0 || cellZ >= layout.gridD) return null;
    return { x: cellX, z: cellZ, fracX: fx - cellX, fracZ: fz - cellZ };
  }

  function wallEdgeFromWorld(x, z) {
    var c = cellFromWorld(x, z);
    if (!c) return null;
    var dW = c.fracX, dE = 1 - c.fracX, dN = c.fracZ, dS = 1 - c.fracZ;
    var m = Math.min(dW, dE, dN, dS);
    if (m === dW) return { orientation: 'V', line: c.x, cell: c.z };
    if (m === dE) return { orientation: 'V', line: c.x + 1, cell: c.z };
    if (m === dN) return { orientation: 'H', line: c.z, cell: c.x };
    return { orientation: 'H', line: c.z + 1, cell: c.x };
  }

  // ── Ground / hit-plane / floors / walls ─────────────────────────────

  function buildGround() {
    if (groundMesh) { scene.remove(groundMesh); groundMesh.geometry.dispose(); groundMesh.material.dispose(); }
    var w = layout.gridW * CELL + 14, d = layout.gridD * CELL + 14;
    var geo = new THREE.PlaneGeometry(w, d);
    var m = new THREE.MeshStandardMaterial({ color: 0x33402f, roughness: 1.0 });
    groundMesh = new THREE.Mesh(geo, m);
    groundMesh.rotation.x = -Math.PI / 2;
    groundMesh.position.y = -0.02;
    groundMesh.receiveShadow = true;
    scene.add(groundMesh);
  }

  function buildHitPlane() {
    if (hitPlane) { scene.remove(hitPlane); hitPlane.geometry.dispose(); hitPlane.material.dispose(); }
    var w = layout.gridW * CELL + 14, d = layout.gridD * CELL + 14;
    var geo = new THREE.PlaneGeometry(w, d);
    var m = new THREE.MeshBasicMaterial({ visible: false });
    hitPlane = new THREE.Mesh(geo, m);
    hitPlane.rotation.x = -Math.PI / 2;
    scene.add(hitPlane);
  }

  function floorCellMesh(x, z, matId) {
    var f = FLOORS[matId] || FLOORS.oak;
    var geo = new THREE.PlaneGeometry(CELL, CELL);
    var m = new THREE.MeshStandardMaterial({ color: f.color, roughness: f.rough, metalness: 0.05 });
    var mesh = new THREE.Mesh(geo, m);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(cellCenterX(x), 0.005, cellCenterZ(z));
    mesh.receiveShadow = true;
    return mesh;
  }

  function rebuildFloors() {
    while (floorGroup.children.length) {
      var c = floorGroup.children.pop();
      c.geometry.dispose(); c.material.dispose();
    }
    floorSet = {};
    Object.keys(layout.floors).forEach(function (key) {
      var parts = key.split(',');
      var x = parseInt(parts[0], 10), z = parseInt(parts[1], 10);
      floorGroup.add(floorCellMesh(x, z, layout.floors[key]));
      floorSet[key] = true;
    });
  }

  function wallMeshFor(seg) {
    var geo, mesh;
    if (seg.orientation === 'H') {
      geo = new THREE.BoxGeometry(CELL, WALL_H, WALL_THICK);
      mesh = new THREE.Mesh(geo, wallMat);
      mesh.position.set(cellCenterX(seg.cell), WALL_H / 2, (seg.line - layout.gridD / 2) * CELL);
    } else {
      geo = new THREE.BoxGeometry(WALL_THICK, WALL_H, CELL);
      mesh = new THREE.Mesh(geo, wallMat);
      mesh.position.set((seg.line - layout.gridW / 2) * CELL, WALL_H / 2, cellCenterZ(seg.cell));
    }
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    return mesh;
  }

  function rebuildWalls() {
    while (wallGroup.children.length) {
      var c = wallGroup.children.pop();
      c.geometry.dispose(); c.material.dispose();
    }
    var color = WALLS[currentStyle.wallId] || WALLS.greige;
    wallMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.92, metalness: 0.0 });
    layout.walls.forEach(function (seg) { wallGroup.add(wallMeshFor(seg)); });
  }

  function applyLighting(moodId) {
    var m = LIGHTING[moodId] || LIGHTING.warm;
    hemiLight.color.setHex(m.hemi);
    hemiLight.groundColor.setHex(m.ground);
    hemiLight.intensity = m.hemiI;
    sunLight.color.setHex(m.sunColor);
    sunLight.intensity = m.sunI;
    var gw = layout.gridW * CELL, gd = layout.gridD * CELL;
    sunLight.position.set(-gw * 0.5, Math.max(gw, gd) * 0.9, -gd * 0.4);
    sunLight.shadow.camera.left = -Math.max(gw, gd);
    sunLight.shadow.camera.right = Math.max(gw, gd);
    sunLight.shadow.camera.top = Math.max(gw, gd);
    sunLight.shadow.camera.bottom = -Math.max(gw, gd);
    sunLight.shadow.camera.updateProjectionMatrix();
    accentLight.color.setHex(m.accent);
    accentLight.intensity = m.accentI;
    accentLight.position.set(cellCenterX(0), 1.6, cellCenterZ(0));
    var bg = moodId === 'evening' ? 0x0c0810 : 0x1a1220;
    scene.background.setHex(bg);
    scene.fog.color.setHex(bg);
  }

  // ── Camera framing ───────────────────────────────────────────────────

  var NORMAL_MIN_POLAR = Math.PI * 0.12;
  var NORMAL_MAX_POLAR = Math.PI * 0.49;
  var OVERHEAD_POLAR = 0.02; // ~1.1°, deliberately not exactly 0 to dodge the gimbal-lock pole

  function fitCameraToGrid() {
    var w = layout.gridW * CELL, d = layout.gridD * CELL;
    var diag = Math.sqrt(w * w + d * d);
    var dist = Math.max(6, diag * 0.78);
    controls.minPolarAngle = NORMAL_MIN_POLAR;
    controls.maxPolarAngle = NORMAL_MAX_POLAR;
    controls.target.set(0, Math.min(1.4, WALL_H * 0.4), 0);
    camera.position.set(dist * 0.55, dist * 0.6, dist * 0.75);
    controls.minDistance = Math.max(2.2, diag * 0.18);
    controls.maxDistance = diag * 1.8 + 6;
    controls.update();
  }

  // NOTE: OrbitControls.update() clamps spherical.phi to
  // [minPolarAngle, maxPolarAngle] on *every* call (including the one at
  // the end of this function, and every frame in animate()). Those bounds
  // default to the normal 3D-view range, so simply repositioning the
  // camera above the grid isn't enough — the very next update() silently
  // snaps it back out of the overhead position. minPolarAngle/maxPolarAngle
  // must be narrowed to the same overhead angle first, or the clamp wins.
  function setOverheadView(on) {
    var w = layout.gridW * CELL, d = layout.gridD * CELL;
    var diag = Math.sqrt(w * w + d * d);
    if (on) {
      controls.minPolarAngle = OVERHEAD_POLAR;
      controls.maxPolarAngle = OVERHEAD_POLAR;
      var dist = Math.max(6, diag * 0.85);
      camera.position.set(dist * 0.02, dist, dist * 0.02);
      controls.target.set(0, 0, 0);
      controls.minDistance = Math.max(2.2, diag * 0.18);
      controls.maxDistance = diag * 1.8 + 6;
    } else {
      fitCameraToGrid();
    }
    controls.update();
  }

  // ── Basic furniture builders — simple primitives, not photoreal ────────

  function mat(color, rough, metal) {
    return new THREE.MeshStandardMaterial({ color: color, roughness: rough === undefined ? 0.7 : rough, metalness: metal === undefined ? 0.05 : metal });
  }

  function addBox(group, w, h, d, x, y, z, material) {
    var mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);
    return mesh;
  }

  function addCyl(group, rT, rB, h, x, y, z, material) {
    var mesh = new THREE.Mesh(new THREE.CylinderGeometry(rT, rB, h, 16), material);
    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);
    return mesh;
  }

  var BUILDERS = {
    sofa: function () {
      var g = new THREE.Group();
      var fabric = mat(ACCENT_ROSE, 0.85);
      addBox(g, 1.7, 0.36, 0.72, 0, 0.2, 0, fabric);
      addBox(g, 1.7, 0.42, 0.16, 0, 0.55, -0.28, fabric);
      addBox(g, 0.16, 0.5, 0.72, -0.77, 0.45, 0, fabric);
      addBox(g, 0.16, 0.5, 0.72, 0.77, 0.45, 0, fabric);
      var legMat = mat(0x3a2a1a, 0.5);
      [[-0.7, -0.28], [0.7, -0.28], [-0.7, 0.28], [0.7, 0.28]].forEach(function (p) {
        addCyl(g, 0.03, 0.03, 0.14, p[0], 0.02, p[1], legMat);
      });
      g.userData.footprint = { w: 1.9, d: 0.9 };
      return g;
    },
    bed: function () {
      var g = new THREE.Group();
      var frame = mat(0x5a3d28, 0.6);
      addBox(g, 1.6, 0.26, 2.0, 0, 0.13, 0, frame);
      addBox(g, 1.6, 0.5, 0.1, 0, 0.4, -0.95, frame);
      var mattress = mat(0xF6EEE0, 0.9);
      addBox(g, 1.5, 0.22, 1.9, 0, 0.37, 0, mattress);
      var pillow = mat(0xFFFFFF, 0.9);
      addBox(g, 0.6, 0.14, 0.4, -0.4, 0.53, -0.75, pillow);
      addBox(g, 0.6, 0.14, 0.4, 0.4, 0.53, -0.75, pillow);
      var blanket = mat(ACCENT_CORAL, 0.85);
      addBox(g, 1.5, 0.08, 0.9, 0, 0.46, 0.45, blanket);
      g.userData.footprint = { w: 1.8, d: 2.2 };
      return g;
    },
    coffee_table: function () {
      var g = new THREE.Group();
      var wood = mat(0x6b4a30, 0.55);
      addBox(g, 0.9, 0.05, 0.55, 0, 0.4, 0, wood);
      [[-0.4, -0.23], [0.4, -0.23], [-0.4, 0.23], [0.4, 0.23]].forEach(function (p) {
        addCyl(g, 0.025, 0.025, 0.38, p[0], 0.19, p[1], wood);
      });
      g.userData.footprint = { w: 1.0, d: 0.65 };
      return g;
    },
    bookshelf: function () {
      var g = new THREE.Group();
      var wood = mat(0x4a3220, 0.6);
      addBox(g, 0.9, 1.7, 0.32, 0, 0.85, 0, wood);
      var inner = mat(0x2e2014, 0.7);
      addBox(g, 0.82, 1.55, 0.02, 0, 0.85, 0.14, inner);
      var books = [ACCENT_ROSE, ACCENT_CORAL, ACCENT_GOLD, 0x6FBFA0, 0xB8A0D9];
      for (var shelf = 0; shelf < 3; shelf++) {
        var y = 0.35 + shelf * 0.5;
        for (var i = 0; i < 5; i++) {
          addBox(g, 0.13, 0.32, 0.2, -0.32 + i * 0.16, y, 0.05, mat(books[i % books.length], 0.8));
        }
      }
      g.userData.footprint = { w: 1.0, d: 0.4 };
      return g;
    },
    lamp: function () {
      var g = new THREE.Group();
      var metalMat = mat(0x2a2a2a, 0.4, 0.6);
      addCyl(g, 0.14, 0.16, 0.04, 0, 0.02, 0, metalMat);
      addCyl(g, 0.02, 0.02, 1.1, 0, 0.58, 0, metalMat);
      var shadeMat = mat(ACCENT_GOLD, 0.7);
      shadeMat.emissive = new THREE.Color(0xffcc88);
      shadeMat.emissiveIntensity = 0.4;
      addCyl(g, 0.22, 0.16, 0.28, 0, 1.18, 0, shadeMat);
      var bulb = new THREE.PointLight(0xffcf9e, 0.9, 4.5, 2);
      bulb.position.set(0, 1.1, 0);
      g.add(bulb);
      g.userData.footprint = { w: 0.36, d: 0.36 };
      return g;
    },
    plant: function () {
      var g = new THREE.Group();
      var potMat = mat(0xB5681F, 0.8);
      addCyl(g, 0.18, 0.14, 0.28, 0, 0.14, 0, potMat);
      var leafMat = mat(0x4A7C59, 0.75);
      var leafMat2 = mat(0x5C9C6E, 0.75);
      addCyl(g, 0.02, 0.02, 0.5, 0, 0.5, 0, mat(0x3d5c34, 0.7));
      [ [0.55, leafMat], [0.42, leafMat2], [0.48, leafMat] ].forEach(function (spec, i) {
        var leaf = new THREE.Mesh(new THREE.SphereGeometry(spec[0] * 0.4, 8, 8), spec[1]);
        leaf.position.set((i - 1) * 0.18, 0.75 + i * 0.08, (i % 2) * 0.12 - 0.06);
        leaf.scale.set(1, 1.3, 1);
        leaf.castShadow = true;
        g.add(leaf);
      });
      g.userData.footprint = { w: 0.4, d: 0.4 };
      return g;
    },
    rug: function () {
      var g = new THREE.Group();
      var rugMat = mat(ACCENT_GOLD, 0.95, 0);
      var mesh = new THREE.Mesh(new THREE.CircleGeometry(1.0, 32), rugMat);
      mesh.rotation.x = -Math.PI / 2;
      mesh.position.y = 0.012;
      mesh.receiveShadow = true;
      g.add(mesh);
      var ringMat = mat(0xffffff, 0.9);
      ringMat.transparent = true; ringMat.opacity = 0.25;
      var ring = new THREE.Mesh(new THREE.RingGeometry(0.78, 0.84, 32), ringMat);
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.013;
      g.add(ring);
      g.userData.footprint = { w: 2.0, d: 2.0 };
      g.userData.flat = true;
      return g;
    },
    chair: function () {
      var g = new THREE.Group();
      var fabric = mat(ACCENT_CORAL, 0.8);
      addBox(g, 0.46, 0.06, 0.46, 0, 0.42, 0, fabric);
      addBox(g, 0.46, 0.5, 0.06, 0, 0.68, -0.2, fabric);
      var legMat = mat(0x3a2a1a, 0.5);
      [[-0.19, -0.19], [0.19, -0.19], [-0.19, 0.19], [0.19, 0.19]].forEach(function (p) {
        addCyl(g, 0.02, 0.02, 0.4, p[0], 0.2, p[1], legMat);
      });
      g.userData.footprint = { w: 0.55, d: 0.55 };
      return g;
    },
    dining_table: function () {
      var g = new THREE.Group();
      var wood = mat(0x8a6339, 0.5);
      addBox(g, 1.4, 0.05, 0.85, 0, 0.72, 0, wood);
      var legMat = mat(0x3a2a1a, 0.5);
      [[-0.62, -0.35], [0.62, -0.35], [-0.62, 0.35], [0.62, 0.35]].forEach(function (p) {
        addBox(g, 0.07, 0.7, 0.07, p[0], 0.35, p[1], legMat);
      });
      g.userData.footprint = { w: 1.5, d: 0.95 };
      return g;
    },
    tv_stand: function () {
      var g = new THREE.Group();
      var wood = mat(0x3a3230, 0.5);
      addBox(g, 1.2, 0.42, 0.36, 0, 0.21, 0, wood);
      var screenMat = mat(0x111111, 0.3, 0.4);
      addBox(g, 1.0, 0.56, 0.04, 0, 0.7, -0.14, screenMat);
      var standMat = mat(0x222222, 0.4);
      addBox(g, 0.06, 0.18, 0.06, -0.3, 0.51, -0.14, standMat);
      addBox(g, 0.06, 0.18, 0.06, 0.3, 0.51, -0.14, standMat);
      g.userData.footprint = { w: 1.3, d: 0.4 };
      return g;
    },
    wardrobe: function () {
      var g = new THREE.Group();
      var wood = mat(0x5a4530, 0.55);
      addBox(g, 1.0, 1.9, 0.6, 0, 0.95, 0, wood);
      var seamMat = mat(0x3a2c1c, 0.6);
      addBox(g, 0.02, 1.8, 0.02, 0, 0.95, 0.31, seamMat);
      var handleMat = mat(0xC9A874, 0.4, 0.6);
      addCyl(g, 0.015, 0.015, 0.12, -0.08, 1.0, 0.31, handleMat);
      addCyl(g, 0.015, 0.015, 0.12, 0.08, 1.0, 0.31, handleMat);
      g.userData.footprint = { w: 1.05, d: 0.65 };
      return g;
    },
    kitchen_counter: function () {
      var g = new THREE.Group();
      var cab = mat(0xEDE6DA, 0.7);
      addBox(g, 1.6, 0.85, 0.6, 0, 0.425, 0, cab);
      var top = mat(0x4a4a4a, 0.35, 0.2);
      addBox(g, 1.65, 0.05, 0.65, 0, 0.875, 0, top);
      var sinkMat = mat(0xBFC4C8, 0.3, 0.6);
      addBox(g, 0.4, 0.06, 0.32, 0.4, 0.86, 0, sinkMat);
      g.userData.footprint = { w: 1.7, d: 0.7 };
      return g;
    },
    stove: function () {
      var g = new THREE.Group();
      var body = mat(0x2c2c2c, 0.4, 0.5);
      addBox(g, 0.6, 0.85, 0.6, 0, 0.425, 0, body);
      var top = mat(0x1a1a1a, 0.3, 0.5);
      addBox(g, 0.62, 0.03, 0.62, 0, 0.865, 0, top);
      var burnerMat = mat(0x111111, 0.5);
      [[-0.15, -0.15], [0.15, -0.15], [-0.15, 0.15], [0.15, 0.15]].forEach(function (p) {
        addCyl(g, 0.07, 0.07, 0.015, p[0], 0.885, p[1], burnerMat);
      });
      g.userData.footprint = { w: 0.65, d: 0.65 };
      return g;
    },
    fridge: function () {
      var g = new THREE.Group();
      var body = mat(0xD8DCDE, 0.35, 0.5);
      addBox(g, 0.7, 1.8, 0.7, 0, 0.9, 0, body);
      var seamMat = mat(0x9AA0A4, 0.4, 0.4);
      addBox(g, 0.72, 0.02, 0.72, 0, 1.28, 0, seamMat);
      var handleMat = mat(0x555555, 0.3, 0.6);
      addBox(g, 0.03, 0.35, 0.03, 0.36, 1.5, 0.2, handleMat);
      addBox(g, 0.03, 0.35, 0.03, 0.36, 0.9, 0.2, handleMat);
      g.userData.footprint = { w: 0.75, d: 0.75 };
      return g;
    },
    toilet: function () {
      var g = new THREE.Group();
      var porcelain = mat(0xF5F5F0, 0.4);
      addBox(g, 0.38, 0.4, 0.18, 0, 0.6, -0.18, porcelain);
      addCyl(g, 0.22, 0.2, 0.4, 0, 0.2, 0.05, porcelain);
      var seatMat = mat(0xFFFFFF, 0.5);
      addCyl(g, 0.2, 0.2, 0.03, 0, 0.41, 0.05, seatMat);
      g.userData.footprint = { w: 0.42, d: 0.62 };
      return g;
    },
    bathroom_sink: function () {
      var g = new THREE.Group();
      var cab = mat(0xEDE6DA, 0.7);
      addBox(g, 0.55, 0.75, 0.42, 0, 0.375, 0, cab);
      var basinMat = mat(0xFFFFFF, 0.4);
      addCyl(g, 0.2, 0.18, 0.1, 0, 0.78, 0, basinMat);
      var faucetMat = mat(0x888888, 0.3, 0.6);
      addCyl(g, 0.012, 0.012, 0.22, 0, 0.94, -0.12, faucetMat);
      g.userData.footprint = { w: 0.58, d: 0.45 };
      return g;
    },
    nightstand: function () {
      var g = new THREE.Group();
      var wood = mat(0x5a3d28, 0.6);
      addBox(g, 0.4, 0.5, 0.4, 0, 0.25, 0, wood);
      var handleMat = mat(0xC9A874, 0.4, 0.6);
      addCyl(g, 0.012, 0.012, 0.1, 0, 0.25, 0.21, handleMat);
      g.userData.footprint = { w: 0.42, d: 0.42 };
      return g;
    },
    desk: function () {
      var g = new THREE.Group();
      var wood = mat(0x6b4a30, 0.55);
      addBox(g, 1.1, 0.05, 0.55, 0, 0.72, 0, wood);
      var legMat = mat(0x3a2a1a, 0.5);
      addBox(g, 0.5, 0.68, 0.5, -0.28, 0.34, 0, legMat);
      addCyl(g, 0.025, 0.025, 0.68, 0.42, 0.34, -0.2, legMat);
      addCyl(g, 0.025, 0.025, 0.68, 0.42, 0.34, 0.2, legMat);
      g.userData.footprint = { w: 1.15, d: 0.6 };
      return g;
    }
  };

  function buildFurnitureMesh(type) {
    var builder = BUILDERS[type];
    if (!builder) return null;
    return builder();
  }

  // ── Sync from Flutter ───────────────────────────────────────────────

  window.loadHouse = function (jsonStr) {
    try {
      var data = JSON.parse(jsonStr);
      if (data.style) {
        currentStyle = data.style;
        applyLighting(currentStyle.lightingId);
      }
      var gridChanged = data.gridW !== layout.gridW || data.gridD !== layout.gridD;
      layout = {
        gridW: data.gridW || 10,
        gridD: data.gridD || 8,
        walls: data.walls || [],
        floors: data.floors || {}
      };

      buildGround();
      buildHitPlane();
      rebuildFloors();
      rebuildWalls();
      applyLighting(currentStyle.lightingId);

      while (furnitureGroup.children.length) {
        furnitureGroup.remove(furnitureGroup.children[0]);
      }
      itemsById = {};
      (data.items || []).forEach(function (it) {
        var mesh = buildFurnitureMesh(it.type);
        if (!mesh) return;
        mesh.position.set(it.x, 0, it.z);
        mesh.rotation.y = it.rotationY || 0;
        mesh.userData.itemId = it.id;
        mesh.userData.itemType = it.type;
        furnitureGroup.add(mesh);
        itemsById[it.id] = mesh;
      });

      if (gridChanged) {
        if (editMode === 'furnish') fitCameraToGrid();
        else setOverheadView(true);
      }
    } catch (e) { /* ignore malformed sync */ }
  };

  window.setStyle = function (floorId, wallId, lightingId) {
    currentStyle = { floorId: floorId, wallId: wallId, lightingId: lightingId };
    rebuildWalls();
    applyLighting(lightingId);
  };

  window.setEditMode = function (mode, payload) {
    editMode = mode;
    if (mode === 'floors' && payload) paintMaterial = payload;
    exitGhost();
    lastPaintedCell = null;
    if (mode === 'furnish') {
      controls.enabled = true;
      setOverheadView(false);
      showHint(null);
    } else {
      controls.enabled = false;
      setOverheadView(true);
      showHint(mode === 'walls' ? 'Tap a wall line to add or remove it' : 'Drag over the floor to paint');
    }
  };

  window.enterPlacementMode = function (type) {
    exitGhost();
    placingType = type;
    ghost = buildFurnitureMesh(type);
    if (!ghost) { placingType = null; return; }
    ghost.traverse(function (o) {
      if (o.isMesh) {
        o.material = o.material.clone();
        o.material.transparent = true;
        o.material.opacity = 0.55;
      }
    });
    ghost.visible = false;
    scene.add(ghost);
    showHint('Tap a floored room to place it');
  };

  window.exitPlacementMode = function () {
    exitGhost();
    showHint(null);
  };

  function exitGhost() {
    if (ghost) { scene.remove(ghost); ghost = null; }
    placingType = null;
  }

  window.rotateItemMesh = function (id) {
    var mesh = itemsById[id];
    if (mesh) mesh.rotation.y += Math.PI / 2;
  };

  function snapFurniture(v) { return Math.round(v / FURN_SNAP) * FURN_SNAP; }

  function worldPointFromEvent(ev) {
    var rect = renderer.domElement.getBoundingClientRect();
    pointer.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
    pointer.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    var hit = raycaster.intersectObject(hitPlane, false);
    if (!hit.length) return null;
    return { x: hit[0].point.x, z: hit[0].point.z };
  }

  function floorPointFromEvent(ev) {
    var w = worldPointFromEvent(ev);
    if (!w) return null;
    var sx = snapFurniture(w.x), sz = snapFurniture(w.z);
    var cell = cellFromWorld(sx, sz);
    if (!cell || !floorSet[cell.x + ',' + cell.z]) return null;
    return { x: sx, z: sz };
  }

  function paintAtEvent(ev) {
    var w = worldPointFromEvent(ev);
    if (!w) return;
    var cell = cellFromWorld(w.x, w.z);
    if (!cell) return;
    var key = cell.x + ',' + cell.z;
    if (lastPaintedCell === key) return;
    lastPaintedCell = key;
    post({ type: 'floorPainted', x: cell.x, z: cell.z, materialId: paintMaterial });
  }

  function onPointerMove(ev) {
    if (downPos) {
      var dx = ev.clientX - downPos.x, dy = ev.clientY - downPos.y;
      if (dx * dx + dy * dy > TAP_SLOP * TAP_SLOP) isDragging = true;
    }
    if (editMode === 'furnish') {
      if (!placingType || !ghost) return;
      var p = floorPointFromEvent(ev);
      if (!p) { ghost.visible = false; return; }
      ghost.visible = true;
      ghost.position.set(p.x, 0, p.z);
      return;
    }
    if (editMode === 'floors' && isDragging) {
      paintAtEvent(ev);
    }
  }

  // A "tap" (place/select/toggle) only fires on pointerup if the pointer
  // never moved past TAP_SLOP since pointerdown — otherwise (in furnish
  // mode) it was an OrbitControls drag and must not also place/select.
  // Build modes (walls/floors) disable OrbitControls entirely so their
  // own drag gestures (paint) never fight the camera.
  var downPos = null;
  var isDragging = false;
  var TAP_SLOP = 8;

  function onPointerDown(ev) {
    downPos = { x: ev.clientX, y: ev.clientY };
    isDragging = false;
  }

  function onPointerUp(ev) {
    var wasDragging = isDragging;
    downPos = null;
    isDragging = false;

    if (editMode === 'floors') {
      if (!wasDragging) paintAtEvent(ev);
      lastPaintedCell = null;
      return;
    }

    if (editMode === 'walls') {
      var w = worldPointFromEvent(ev);
      if (!w) return;
      var edge = wallEdgeFromWorld(w.x, w.z);
      if (!edge) return;
      post({ type: 'wallToggled', orientation: edge.orientation, line: edge.line, cell: edge.cell });
      return;
    }

    if (wasDragging) return;

    if (placingType) {
      var p = floorPointFromEvent(ev);
      if (!p) return;
      post({ type: 'placed', itemType: placingType, x: p.x, z: p.z, rotationY: 0 });
      exitGhost();
      showHint(null);
      return;
    }
    var rect = renderer.domElement.getBoundingClientRect();
    pointer.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
    pointer.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    var hits = raycaster.intersectObjects(furnitureGroup.children, true);
    if (!hits.length) return;
    var obj = hits[0].object;
    while (obj && !obj.userData.itemId) obj = obj.parent;
    if (obj) post({ type: 'selected', id: obj.userData.itemId });
  }

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }

  init();
})();
</script>
</body>
</html>
