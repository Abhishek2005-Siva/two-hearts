name: two_hearts
description: "A private digital world for two"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.6
  http: ^1.2.0
  googleapis_auth: ^1.6.0
  firebase_messaging: ^15.2.5

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0
  lottie: ^3.3.1

  # Media
  image_picker: ^1.1.2
  video_player: ^2.9.2
  flutter_sound: ^9.15.10
  audioplayers: ^6.1.0
  path_provider: ^2.1.5

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  permission_handler: ^11.4.0
  timeago: ^3.7.0
  confetti: ^0.7.0
  flutter_local_notifications: ^18.0.1
  vibration: ^2.0.0

  # 3D / model viewer
  model_viewer_plus: ^1.10.0
  camera: ^0.12.0+1
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  geolocator: ^13.0.2
  file_picker: ^8.1.7
  flutter_webrtc: ^0.12.0
  flutter_pdfview: ^1.4.4

  # Listen Together (Spotify Web API + OAuth PKCE)
  flutter_web_auth_2: ^4.1.0
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.5
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D0408"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/models/
    - assets/config/
